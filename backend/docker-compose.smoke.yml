services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ownermate
      POSTGRES_USER: ownermate
      POSTGRES_PASSWORD: ownermate
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ownermate -d ownermate"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://ownermate:ownermate@db:5432/ownermate
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SENTIMENT_PROVIDER: mock
      CONTENT_PROVIDER: mock
      GOOGLE_REVIEW_PROVIDER: mock
      FACEBOOK_REVIEW_PROVIDER: mock
      REVIEW_INTELLIGENCE_PROVIDER: mock
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
