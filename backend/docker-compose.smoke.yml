services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ownermate
      POSTGRES_USER: ownermate
      POSTGRES_PASSWORD: ownermate
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ownermate -d ownermate"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://ownermate:ownermate@db:5432/ownermate
      SUPABASE_URL: https://yzffmemazflnrdbgsziz.supabase.co
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6ZmZtZW1hemZsbnJkYmdzeml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTI5NjUsImV4cCI6MjA5MDc4ODk2NX0.h5LrNyfxgbXmy3C6rtiQ0PZQWNDVnEWG99rbg2bjemE
      SUPABASE_SERVICE_ROLE_KEY: local-dev-placeholder
      SENTIMENT_PROVIDER: mock
      CONTENT_PROVIDER: mock
      GOOGLE_REVIEW_PROVIDER: mock
      FACEBOOK_REVIEW_PROVIDER: mock
      REVIEW_INTELLIGENCE_PROVIDER: mock
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
