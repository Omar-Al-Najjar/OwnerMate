services:
  sentiment-api:
    build: .
    image: sentiment-api:latest
    container_name: sentiment-api
    ports:
      - "${HOST_PORT:-8030}:8000"
    environment:
      BASE_MODEL: FacebookAI/xlm-roberta-base
      MODEL_DIR: /app/model
      MAX_LENGTH: "128"
      PORT: "8000"
      WORKERS: "1"
    volumes:
      - hf_cache:/app/.cache/huggingface
    restart: unless-stopped

volumes:
  hf_cache:
