<!doctype html>

<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign In - OwnerMate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#747575",
              "secondary-fixed-dim": "#acabab",
              "surface-variant": "#e2e2e2",
              "surface-container-low": "#f3f3f3",
              "surface-bright": "#f9f9f9",
              "on-tertiary-fixed-variant": "#e3e2e2",
              "on-primary": "#e2e2e2",
              "secondary-fixed": "#c7c6c6",
              "on-tertiary-fixed": "#ffffff",
              "outline-variant": "#c6c6c6",
              "primary-fixed-dim": "#474747",
              "surface-container-highest": "#e2e2e2",
              "on-primary-container": "#ffffff",
              "surface-tint": "#5e5e5e",
              "on-secondary-fixed-variant": "#3b3b3c",
              "inverse-on-surface": "#f1f1f1",
              "on-tertiary": "#e3e2e2",
              surface: "#f9f9f9",
              secondary: "#5e5e5e",
              "primary-container": "#3b3b3b",
              primary: "#000000",
              "inverse-surface": "#2f3131",
              "on-primary-fixed": "#ffffff",
              "inverse-primary": "#c6c6c6",
              outline: "#777777",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "on-secondary-container": "#1b1c1c",
              "tertiary-fixed-dim": "#464747",
              "on-secondary": "#ffffff",
              background: "#f9f9f9",
              "on-surface": "#1a1c1c",
              "surface-dim": "#dadada",
              "primary-fixed": "#5e5e5e",
              "on-surface-variant": "#474747",
              "on-background": "#1a1c1c",
              "tertiary-fixed": "#5d5e5f",
              "secondary-container": "#d5d4d4",
              tertiary: "#3a3c3c",
              error: "#ba1a1a",
              "surface-container": "#eeeeee",
              "surface-container-high": "#e8e8e8",
              "on-tertiary-container": "#ffffff",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#1b1c1c",
              "on-primary-fixed-variant": "#e2e2e2",
              "on-error-container": "#410002",
            },
            fontFamily: {
              headline: ["Inter"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0px",
              lg: "0px",
              xl: "0px",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .dot-grid {
        background-image: radial-gradient(#c6c6c6 1px, transparent 1px);
        background-size: 24px 24px;
      }
      input:focus {
        outline: none !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body
    class="bg-surface font-body text-on-surface antialiased overflow-hidden"
  >
    <!-- Top Navigation Anchor (Suppressing Side/Bottom Nav as per Transactional Rule) -->
    <header
      class="flex justify-between items-center px-6 py-6 w-full fixed top-0 z-50"
    >
      <div
        class="text-xl font-bold tracking-tighter text-black dark:text-white uppercase"
      >
        OwnerMate
      </div>
      <div class="flex gap-4 items-center">
        <button
          class="flex items-center gap-2 px-3 py-1.5 hover:bg-surface-container-high transition-colors font-['Inter'] tracking-tight text-sm"
        >
          <span
            class="material-symbols-outlined text-[18px]"
            data-icon="language"
            >language</span
          >
          <span>English</span>
        </button>
        <button
          class="flex items-center p-2 hover:bg-surface-container-high transition-colors"
        >
          <span class="material-symbols-outlined" data-icon="contrast"
            >contrast</span
          >
        </button>
      </div>
    </header>
    <main
      class="relative min-h-screen w-full flex items-center justify-center dot-grid px-4"
    >
      <!-- Auth Container -->
      <div class="w-full max-w-[440px] z-10">
        <!-- Glassmorphism card shell -->
        <div
          class="bg-surface-container-lowest/80 backdrop-blur-xl p-8 md:p-12 border-t-2 border-primary"
        >
          <div class="mb-10">
            <h1 class="text-3xl font-black tracking-tighter uppercase mb-2">
              Sign In
            </h1>
            <p class="text-sm text-outline tracking-tight">
              Access your management suite
            </p>
          </div>
          <form class="space-y-8">
            <!-- Input Groups -->
            <div class="space-y-6">
              <div class="relative group">
                <label
                  class="block text-[10px] uppercase tracking-widest font-semibold mb-1 text-outline group-focus-within:text-primary transition-colors"
                >
                  Email Address
                </label>
                <input
                  class="w-full bg-transparent border-b border-outline/20 py-2 text-on-surface placeholder:text-surface-dim focus:border-primary transition-all rounded-none"
                  placeholder="name@company.com"
                  type="email"
                />
              </div>
              <div class="relative group">
                <label
                  class="block text-[10px] uppercase tracking-widest font-semibold mb-1 text-outline group-focus-within:text-primary transition-colors"
                >
                  Password
                </label>
                <input
                  class="w-full bg-transparent border-b border-outline/20 py-2 text-on-surface placeholder:text-surface-dim focus:border-primary transition-all rounded-none"
                  placeholder="••••••••"
                  type="password"
                />
              </div>
            </div>
            <div
              class="flex items-center justify-between text-[11px] uppercase tracking-wider font-bold"
            >
              <label class="flex items-center gap-2 cursor-pointer group">
                <input
                  class="w-4 h-4 border-outline/40 text-primary focus:ring-0 rounded-none cursor-pointer"
                  type="checkbox"
                />
                <span
                  class="text-outline group-hover:text-primary transition-colors"
                  >Remember Me</span
                >
              </label>
              <a
                class="text-outline hover:text-primary underline-offset-4 hover:underline transition-all"
                href="#"
                >Forgot Password?</a
              >
            </div>
            <button
              class="w-full bg-primary text-on-primary py-4 font-bold uppercase tracking-widest text-sm hover:opacity-90 active:scale-[0.98] transition-all"
              type="submit"
            >
              Sign In
            </button>
          </form>
          <!-- Divider -->
          <div class="relative my-10 flex items-center">
            <div class="flex-grow border-t border-outline/10"></div>
            <span
              class="px-4 text-[10px] uppercase tracking-[0.2em] font-bold text-outline"
              >or continue with</span
            >
            <div class="flex-grow border-t border-outline/10"></div>
          </div>
          <!-- Social Auth -->
          <div class="grid gap-4 flex justify-center">
            <button
              class="flex items-center justify-center gap-3 py-3 border border-outline/20 hover:bg-surface-container-low transition-all active:scale-[0.98] w-full"
            >
              <img
                alt=""
                class="w-4 h-4"
                data-alt="Google logo icon"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCKWpbKIY2NCPd72ARADuc4Wp94pEIhZVqyPVsXas3ogiBxDBX4740FrtIJFDqCaY-WT99Af89fohTyuzS_DQ-Yu5lgtYJLM1qQPifsdmXET_AWOVDO6_ybTzAfggRgo-7hgdm-G3bWHAcpLinAaWGK4e9HPOpAsQiw16TZthU5fHpqy9-XsekW-Hx-vH4WvTmzSRs36caERHO2asz7UDSxGGD4dyAxcNIR-FBRuwcEB56pwqnRtr3HqBY1BzViRUj3jPgJWgCJYXc"
              />
              <span class="text-[11px] uppercase tracking-widest font-bold"
                >Google</span
              >
            </button>
          </div>
          <div class="mt-12 pt-8 border-t border-outline/10 text-center">
            <p class="text-xs text-outline tracking-tight">
              Don't have an account?
              <a
                class="text-primary font-bold uppercase tracking-wider ml-2 hover:underline underline-offset-4"
                href="#"
                >Create Account</a
              >
            </p>
          </div>
        </div>
        <!-- Footer Meta -->
        <div class="mt-6 flex justify-between px-2">
          <p class="text-[10px] text-outline uppercase tracking-tighter">
            © 2024 OwnerMate Inc.
          </p>
          <div class="flex gap-4">
            <a
              class="text-[10px] text-outline uppercase tracking-tighter hover:text-primary transition-colors"
              href="#"
              >Privacy</a
            >
            <a
              class="text-[10px] text-outline uppercase tracking-tighter hover:text-primary transition-colors"
              href="#"
              >Terms</a
            >
          </div>
        </div>
      </div>
      <!-- Decorative Blueprint Element (Asymmetry) -->
      <div
        class="absolute right-0 bottom-0 p-12 hidden lg:block select-none opacity-20 pointer-events-none"
      >
        <div class="flex flex-col items-end">
          <div
            class="text-[120px] font-black leading-none text-outline-variant tracking-tighter"
          >
            01
          </div>
          <div class="w-64 h-px bg-outline-variant mt-2"></div>
          <div
            class="text-xs font-mono uppercase tracking-[0.5em] text-outline mt-2"
          >
            Authentication Layer v4.02
          </div>
        </div>
      </div>
      <div
        class="absolute left-10 top-1/2 -translate-y-1/2 hidden xl:block select-none opacity-10 pointer-events-none"
      >
        <div
          class="rotate-90 origin-left text-[10px] font-mono uppercase tracking-[1em] text-outline whitespace-nowrap"
        >
          owner_mate_identity_protocol_active
        </div>
      </div>
    </main>
    <!-- Contextual FAB (Suppressed as per rules for Transactional screen) -->
  </body>
</html>
