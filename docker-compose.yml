services:
  frontend:
    build:
      context: ./frontend/frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    env_file:
      - .env
    environment:
      BACKEND_API_BASE_URL: http://backend:8000
      DATASET_ANALYSIS_SERVICE_URL: http://dataset-analysis:8020
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
      dataset-analysis:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./backend/backend
    env_file:
      - .env
    environment:
      SENTIMENT_API_BASE_URL: http://sentiment-api:8000
      GOOGLE_MAPS_API_BASE_URL: http://google-maps-api:8000
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      sentiment-api:
        condition: service_started
      google-maps-api:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3); sys.exit(0)
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  dataset-analysis:
    build:
      context: ./AI-system/Agent prototype
    env_file:
      - .env
    ports:
      - "${DATASET_ANALYSIS_HOST_PORT:-8020}:8020"
    restart: unless-stopped

  sentiment-api:
    build:
      context: ./AI-system/Sentiment analysis model
    env_file:
      - .env
    environment:
      BASE_MODEL: ${SENTIMENT_BASE_MODEL:-FacebookAI/xlm-roberta-base}
      MODEL_DIR: /app/model
      MAX_LENGTH: "${SENTIMENT_MAX_LENGTH:-128}"
      PORT: "8000"
      WORKERS: "${SENTIMENT_WORKERS:-1}"
    ports:
      - "${SENTIMENT_HOST_PORT:-8030}:8000"
    volumes:
      - hf_cache:/app/.cache/huggingface
    restart: unless-stopped

  google-maps-scraper:
    image: gosom/google-maps-scraper:latest
    command: ["-web", "-addr", ":8080", "-data-folder", "/gmapsdata", "-c", "${GOOGLE_MAPS_SCRAPER_CONCURRENCY:-4}"]
    volumes:
      - gmapsdata:/gmapsdata
    restart: unless-stopped

  google-maps-api:
    build:
      context: ./AI-system/google-maps-api
    env_file:
      - .env
    environment:
      SCRAPER_BASE_URL: http://google-maps-scraper:8080
    ports:
      - "${GOOGLE_MAPS_API_HOST_PORT:-8010}:8000"
    depends_on:
      google-maps-scraper:
        condition: service_started
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "1"
      - --timeout-keep-alive
      - "800"
      - --timeout-graceful-shutdown
      - "900"

volumes:
  gmapsdata:
  hf_cache:
